# Local Mac overrides — applied automatically by docker compose up
# Adds FFmpeg test signal and static IP workaround for Docker Desktop DNS bug

services:
  mediamtx:
    networks:
      rtsp:
        ipv4_address: 172.30.0.2

  ffmpeg:
    image: linuxserver/ffmpeg
    networks:
      - rtsp
    depends_on:
      - mediamtx
    restart: always
    command: >
      -re -f lavfi -i testsrc2=size=1280x720:rate=30
      -f lavfi -i sine=frequency=1000:sample_rate=44100
      -c:v libx264 -preset ultrafast -tune zerolatency
      -c:a aac
      -f rtsp rtsp://172.30.0.2:8554/test

networks:
  rtsp:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
